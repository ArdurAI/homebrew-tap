name: sync-sith

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

concurrency:
  group: sync-sith
  cancel-in-progress: false

jobs:
  sync:
    name: verify and import latest Sith formula
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Discover latest stable Sith release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! release=$(gh api repos/ArdurAI/sith/releases/latest 2>/dev/null); then
            echo "No public Sith release exists yet; nothing to synchronize."
            echo "HAS_RELEASE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          tag=$(jq -r '.tag_name' <<<"$release")
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::latest Sith release is not a stable semantic version: $tag"
            exit 1
          fi
          echo "HAS_RELEASE=true" >> "$GITHUB_ENV"
          echo "SITH_TAG=$tag" >> "$GITHUB_ENV"

      - name: Install pinned Cosign
        if: env.HAS_RELEASE == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Download formula and signed checksum manifest
        if: env.HAS_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sith-release"
          gh release download "$SITH_TAG" \
            --repo ArdurAI/sith \
            --pattern sith.rb \
            --pattern sith.rb.sigstore.json \
            --pattern checksums.txt \
            --pattern checksums.txt.sigstore.json \
            --dir "$RUNNER_TEMP/sith-release"

      - name: Verify release-workflow identities
        if: env.HAS_RELEASE == 'true'
        run: |
          set -euo pipefail
          identity="https://github.com/ArdurAI/sith/.github/workflows/release.yml@refs/tags/${SITH_TAG}"
          issuer="https://token.actions.githubusercontent.com"
          cosign verify-blob \
            --bundle "$RUNNER_TEMP/sith-release/sith.rb.sigstore.json" \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "$RUNNER_TEMP/sith-release/sith.rb"
          cosign verify-blob \
            --bundle "$RUNNER_TEMP/sith-release/checksums.txt.sigstore.json" \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "$RUNNER_TEMP/sith-release/checksums.txt"

      - name: Bind formula URLs and hashes to signed checksums
        if: env.HAS_RELEASE == 'true'
        env:
          RELEASE_DIR: ${{ runner.temp }}/sith-release
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import sys

          release_dir = pathlib.Path(os.environ["RELEASE_DIR"])
          formula = (release_dir / "sith.rb").read_text(encoding="utf-8")
          checksum_lines = (release_dir / "checksums.txt").read_text(encoding="utf-8").splitlines()
          checksums = {}
          for line in checksum_lines:
              match = re.fullmatch(r"([0-9a-f]{64}) [ *]([^/\\]+)", line)
              if not match:
                  sys.exit(f"invalid checksum line: {line!r}")
              checksums[match.group(2)] = match.group(1)

          pairs = re.findall(r'url "([^"]+)"\s+sha256 "([0-9a-f]{64})"', formula)
          if len(pairs) != 4:
              sys.exit(f"formula contains {len(pairs)} URL/hash pairs, want 4")
          expected_prefix = f"https://github.com/ArdurAI/sith/releases/download/{os.environ['SITH_TAG']}/"
          seen = set()
          for url, digest in pairs:
              if not url.startswith(expected_prefix):
                  sys.exit(f"formula URL is outside the tagged Sith release: {url}")
              name = url.removeprefix(expected_prefix)
              if name in seen or checksums.get(name) != digest:
                  sys.exit(f"formula hash is missing, duplicated, or mismatched for {name}")
              seen.add(name)
          required = {
              f"sith_{os.environ['SITH_TAG'][1:]}_{goos}_{arch}.tar.gz"
              for goos in ("darwin", "linux")
              for arch in ("amd64", "arm64")
          }
          if seen != required:
              sys.exit(f"formula target set mismatch: got {sorted(seen)}, want {sorted(required)}")
          PY
          ruby -c "$RUNNER_TEMP/sith-release/sith.rb"

      - name: Audit, install, and test candidate formula
        if: env.HAS_RELEASE == 'true'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          set -euo pipefail
          candidate_tap=ArdurAI/sith-candidate
          brew tap-new --no-git "$candidate_tap"
          candidate_dir=$(brew --repository "$candidate_tap")
          trap 'brew uninstall --force sith >/dev/null 2>&1 || true; brew untap "$candidate_tap" >/dev/null 2>&1 || true' EXIT
          install -m 0644 "$RUNNER_TEMP/sith-release/sith.rb" "$candidate_dir/Formula/sith.rb"
          brew trust --formula "$candidate_tap/sith"
          brew audit --strict --formula "$candidate_tap/sith"
          brew style "$candidate_dir/Formula/sith.rb"
          brew install --formula "$candidate_tap/sith"
          brew test "$candidate_tap/sith"
          sith version --output json

      - name: Update formula through the scoped repository API
        if: env.HAS_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source_formula="$RUNNER_TEMP/sith-release/sith.rb"
          if [ -f Formula/sith.rb ] && cmp -s "$source_formula" Formula/sith.rb; then
            echo "Formula already matches $SITH_TAG."
            exit 0
          fi

          content=$(base64 < "$source_formula" | tr -d '\n')
          message=$(printf 'chore: update Sith formula to %s\n\nSigned-off-by: Gnani Rahul <gnani.nutakki@gmail.com>\n' "$SITH_TAG")
          api_args=(
            --method PUT
            -f "message=$message"
            -f "content=$content"
            -f "branch=main"
            -f "committer[name]=Gnani Rahul"
            -f "committer[email]=gnani.nutakki@gmail.com"
          )
          if current_sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/Formula/sith.rb" --jq '.sha' 2>/dev/null); then
            api_args+=(-f "sha=$current_sha")
          fi
          gh api "repos/${GITHUB_REPOSITORY}/contents/Formula/sith.rb" "${api_args[@]}" --silent
